name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build all packages
        run: npm run build --workspaces --if-present || echo "No build script"

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @zyphos/agents
        continue-on-error: true
        run: |
          cd packages/agents
          npm publish --access public || echo "Already published or error — skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @zyphos/orchestrator
        continue-on-error: true
        run: |
          cd packages/orchestrator
          npm publish --access public || echo "Already published or error — skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @zyphos/guardrails
        continue-on-error: true
        run: |
          cd packages/guardrails
          npm publish --access public || echo "Already published or error — skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @zyphos/builder
        continue-on-error: true
        run: |
          cd packages/builder
          npm publish --access public || echo "Already published or error — skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @zyphos/sdk
        continue-on-error: true
        run: |
          if [ -d "packages/sdk" ]; then
            cd packages/sdk && npm publish --access public || echo "Already published"
          else
            echo "packages/sdk not found — skipping until built"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## Publish run complete" >> $GITHUB_STEP_SUMMARY
          echo "- @zyphos/agents" >> $GITHUB_STEP_SUMMARY
          echo "- @zyphos/orchestrator" >> $GITHUB_STEP_SUMMARY
          echo "- @zyphos/guardrails" >> $GITHUB_STEP_SUMMARY
          echo "- @zyphos/builder" >> $GITHUB_STEP_SUMMARY
          echo "- @zyphos/sdk — skipped until package is built" >> $GITHUB_STEP_SUMMARY
