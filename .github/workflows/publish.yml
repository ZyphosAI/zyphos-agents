name: Publish to npm

on:
  release:
    types: [published]   # triggers when you publish a GitHub Release
  workflow_dispatch:      # allows manual trigger from GitHub Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # required for npm provenance

    steps:
      # 1. Check out the full repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js with npm registry configured
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # 3. Install all dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build all packages
      - name: Build
        run: npm run build --workspaces --if-present

      # 5. Publish each package — skips if version already exists
      - name: Publish @zyphos/agents
        run: |
          cd packages/agents
          npm publish --access public --provenance || echo "Already published"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @zyphos/orchestrator
        run: |
          cd packages/orchestrator
          npm publish --access public --provenance || echo "Already published"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @zyphos/guardrails
        run: |
          cd packages/guardrails
          npm publish --access public --provenance || echo "Already published"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @zyphos/builder
        run: |
          cd packages/builder
          npm publish --access public --provenance || echo "Already published"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @zyphos/sdk
        run: |
          cd packages/sdk
          npm publish --access public --provenance || echo "Skipped — sdk not ready yet"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 6. Post a summary of what was published
      - name: Summary
        run: |
          echo "## Published packages" >> $GITHUB_STEP_SUMMARY
          echo "- @zyphos/agents" >> $GITHUB_STEP_SUMMARY
          echo "- @zyphos/orchestrator" >> $GITHUB_STEP_SUMMARY
          echo "- @zyphos/guardrails" >> $GITHUB_STEP_SUMMARY
          echo "- @zyphos/builder" >> $GITHUB_STEP_SUMMARY
